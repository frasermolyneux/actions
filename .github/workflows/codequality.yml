name: reusable-code-quality

on:
  workflow_call:
    inputs:
      sonar-project-key:
        description: SonarCloud project key (e.g., frasermolyneux_portal-server-events).
        required: true
        type: string
      sonar-organization:
        description: SonarCloud organization key.
        required: false
        default: frasermolyneux
        type: string
      sonar-host-url:
        description: SonarCloud host URL.
        required: false
        default: https://sonarcloud.io
        type: string
      build-target:
        description: Selects the composite build action to run (dotnet-ci, dotnet-web-ci, dotnet-func-ci, or cmake-ci).
        required: false
        default: dotnet-ci
        type: string
      dotnet-project:
        description: Required when build-target is dotnet-func-ci or dotnet-web-ci; the project name.
        required: false
        type: string
      publish-frameworks:
        description: Optional list of target frameworks to publish (only for dotnet-web-ci).
        required: false
        default: ""
        type: string
      nuget-artifact-name:
        description: Artifact name for NuGet packages (dotnet-web-ci only).
        required: false
        default: nuget-packages
        type: string
      dotnet-version:
        description: .NET SDK version(s) to install.
        required: false
        default: 9.0.x
        type: string
      skip-format-check:
        description: Skip dotnet format verification in .NET build actions.
        required: false
        default: false
        type: boolean
      src-folder:
        description: Folder that contains the .NET solution/projects.
        required: false
        default: src
        type: string
      use-framework-output-root:
        description: For dotnet-func-ci, upload the first target framework folder instead of bin/Release.
        required: false
        default: false
        type: boolean
      codeql-languages:
        description: CodeQL languages to initialize (for example csharp or cpp).
        required: false
        default: csharp
        type: string
      codeql-category:
        description: Category used by CodeQL analyze.
        required: false
        default: /language:csharp
        type: string
      cmake-source-dir:
        description: Source directory for CMake builds.
        required: false
        default: .
        type: string
      cmake-build-dir:
        description: Build directory for CMake builds.
        required: false
        default: build
        type: string
      cmake-configure-args:
        description: Additional arguments passed to cmake configure.
        required: false
        default: -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        type: string
      cmake-build-args:
        description: Additional arguments passed to cmake --build.
        required: false
        default: --config Release
        type: string
      ctest-args:
        description: Additional arguments passed to ctest.
        required: false
        default: --output-on-failure --build-config Release
        type: string
      skip-sonar:
        description: Skip SonarCloud analysis (only run CodeQL).
        required: false
        default: false
        type: boolean
      skip-codeql:
        description: Skip CodeQL analysis (only run SonarCloud).
        required: false
        default: false
        type: boolean
    secrets:
      SONAR_TOKEN:
        description: SonarCloud token with analysis rights.
        required: false

permissions: {}

jobs:
  code-quality:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Code Quality
    runs-on: ubuntu-latest
    env:
      SONAR_CACHE_DIR: ~/.sonar/cache
      SONAR_SCANNER_DIR: $RUNNER_TEMP/sonar-scanner

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        if: ${{ inputs.skip-sonar != true }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          java-version: 17
          distribution: zulu

      - name: Cache SonarCloud packages
        if: ${{ inputs.skip-sonar != true && inputs.build-target != 'cmake-ci' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ env.SONAR_CACHE_DIR }}
          key: ${{ runner.os }}-sonar-cache

      - name: Cache SonarCloud scanner
        if: ${{ inputs.skip-sonar != true && inputs.build-target != 'cmake-ci' }}
        id: cache-sonar-scanner
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ env.SONAR_SCANNER_DIR }}
          key: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: ${{ inputs.skip-sonar != true && inputs.build-target != 'cmake-ci' && steps.cache-sonar-scanner.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          mkdir -p "${{ env.SONAR_SCANNER_DIR }}"
          dotnet tool update dotnet-sonarscanner --tool-path "${{ env.SONAR_SCANNER_DIR }}"

      - name: Validate build target
        shell: bash
        run: |
          case "${{ inputs.build-target }}" in
            dotnet-ci|dotnet-web-ci|dotnet-func-ci|cmake-ci) ;;
            *)
              echo "Unsupported build-target: ${{ inputs.build-target }}" >&2
              exit 1
              ;;
          esac

      - name: Initialize CodeQL
        if: ${{ inputs.skip-codeql != true }}
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a
        with:
          languages: ${{ inputs.codeql-languages }}

      - name: Validate project inputs
        if: inputs.build-target == 'dotnet-func-ci' || inputs.build-target == 'dotnet-web-ci'
        shell: bash
        run: |
          if [ -z "${{ inputs.dotnet-project }}" ]; then
            echo "dotnet-project is required when build-target is dotnet-func-ci or dotnet-web-ci" >&2
            exit 1
          fi

      - name: Begin SonarCloud analysis
        if: ${{ inputs.skip-sonar != true && inputs.build-target != 'cmake-ci' }}
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd "${{ inputs.src-folder }}"
          "${{ env.SONAR_SCANNER_DIR }}/dotnet-sonarscanner" begin \
            /k:"${{ inputs.sonar-project-key }}" \
            /o:"${{ inputs.sonar-organization }}" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="${{ inputs.sonar-host-url }}"

      - name: Build and test (.NET)
        if: inputs.build-target == 'dotnet-ci'
        uses: frasermolyneux/actions/dotnet-ci@dotnet-ci/v2
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          skip-format-check: ${{ inputs.skip-format-check }}
          src-folder: ${{ inputs.src-folder }}
          perform-checkout: 'false'

      - name: Build and publish (Web)
        if: inputs.build-target == 'dotnet-web-ci'
        uses: frasermolyneux/actions/dotnet-web-ci@dotnet-web-ci/v2
        with:
          dotnet-project: ${{ inputs.dotnet-project }}
          dotnet-version: ${{ inputs.dotnet-version }}
          publish-frameworks: ${{ inputs.publish-frameworks }}
          skip-format-check: ${{ inputs.skip-format-check }}
          src-folder: ${{ inputs.src-folder }}
          nugetArtifactName: ${{ inputs.nuget-artifact-name }}
          perform-checkout: 'false'

      - name: Build and test (Function)
        if: inputs.build-target == 'dotnet-func-ci'
        uses: frasermolyneux/actions/dotnet-func-ci@dotnet-func-ci/v2
        with:
          dotnet-project: ${{ inputs.dotnet-project }}
          dotnet-version: ${{ inputs.dotnet-version }}
          skip-format-check: ${{ inputs.skip-format-check }}
          src-folder: ${{ inputs.src-folder }}
          perform-checkout: 'false'
          use-framework-output-root: ${{ inputs.use-framework-output-root }}

      - name: Configure CMake
        if: inputs.build-target == 'cmake-ci'
        shell: bash
        run: |
          cmake -S "${{ inputs.cmake-source-dir }}" -B "${{ inputs.cmake-build-dir }}" ${{ inputs.cmake-configure-args }}

      - name: Build (CMake)
        if: inputs.build-target == 'cmake-ci'
        shell: bash
        run: |
          cmake --build "${{ inputs.cmake-build-dir }}" ${{ inputs.cmake-build-args }}

      - name: Test (CMake)
        if: inputs.build-target == 'cmake-ci'
        shell: bash
        run: |
          ctest --test-dir "${{ inputs.cmake-build-dir }}" ${{ inputs.ctest-args }}

      - name: Run SonarCloud analysis (C/C++)
        if: ${{ inputs.skip-sonar != true && inputs.build-target == 'cmake-ci' }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.organization=${{ inputs.sonar-organization }}
            -Dsonar.host.url=${{ inputs.sonar-host-url }}

      - name: End SonarCloud analysis
        if: ${{ inputs.skip-sonar != true && inputs.build-target != 'cmake-ci' && always() }}
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd "${{ inputs.src-folder }}"
          "${{ env.SONAR_SCANNER_DIR }}/dotnet-sonarscanner" end /d:sonar.token="$SONAR_TOKEN"

      - name: Perform CodeQL analysis
        if: ${{ inputs.skip-codeql != true }}
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a
        with:
          category: ${{ inputs.codeql-category }}
