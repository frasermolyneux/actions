name: "copilot-setup"
description: "Shared setup for Copilot coding-agent sessions (repo checkout, shared .github-copilot checkout, optional runtimes)."

inputs:
  checkout-repo:
    description: "Checkout the current repository first."
    required: false
    default: "true"
  checkout-fetch-depth:
    description: "Fetch depth used when checking out the current repository."
    required: false
    default: "1"
  checkout-shared-copilot:
    description: "Checkout frasermolyneux/.github-copilot for shared instructions/prompts/agents."
    required: false
    default: "true"
  shared-copilot-repository:
    description: "Repository to checkout for shared Copilot configuration."
    required: false
    default: "frasermolyneux/.github-copilot"
  shared-copilot-path:
    description: "Path where shared Copilot configuration is checked out."
    required: false
    default: ".github-copilot"
  setup-dotnet:
    description: "Install .NET SDK(s)."
    required: false
    default: "false"
  dotnet-version:
    description: "The version(s) of .NET to install (newline or comma separated)."
    required: false
    default: "9.0.x\n10.0.x"
  setup-node:
    description: "Install Node.js."
    required: false
    default: "false"
  node-version:
    description: "The Node.js version to install when setup-node is true."
    required: false
    default: "20.x"
  setup-python:
    description: "Install Python."
    required: false
    default: "false"
  python-version:
    description: "The Python version to install when setup-python is true."
    required: false
    default: "3.x"

runs:
  using: "composite"
  steps:
    - name: Validate shared Copilot path
      if: inputs.checkout-shared-copilot == 'true'
      shell: bash
      run: |
        set -euo pipefail
        path="${{ inputs.shared-copilot-path }}"
        if [[ -z "$path" || "$path" == "." || "$path" == "/" ]]; then
          echo "Invalid shared-copilot-path '$path'. Use a non-root path such as .github-copilot."
          exit 1
        fi

    - name: Checkout code
      if: inputs.checkout-repo == 'true'
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ inputs.checkout-fetch-depth }}

    - name: Checkout shared Copilot configuration
      if: inputs.checkout-shared-copilot == 'true'
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.shared-copilot-repository }}
        path: ${{ inputs.shared-copilot-path }}

    - name: Setup .NET
      if: inputs.setup-dotnet == 'true'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Setup Node.js
      if: inputs.setup-node == 'true'
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Python
      if: inputs.setup-python == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
