name: "deploy-sql-database"
description: "Deploys a DACPAC to an Azure SQL Database using the sql-action, with optional pre-deploy export for destructive changes"

inputs:
  sql-args:
    description: "Sql args that can contain environment variable se.g. /Variables:env=dev /Variables:instance=01"
    required: true
  sql-server-fqdn:
    description: "The SQL Server fully qualified domain name"
    required: true
  sql-database-name:
    description: "The target SQL Database name"
    required: true
  project-folder:
    description: "The folder containing the SQL Project"
    required: true
    default: "src/database"
  project-file:
    description: "The SQL Project file"
    required: true
    default: "database.sqlproj"
  AZURE_CLIENT_ID: 
    description: "The azure client/application ID configured for federated access"
    required: true
    type: string
  AZURE_TENANT_ID: 
    description: "The target Azure tenant"
    required: true
    type: string
  AZURE_SUBSCRIPTION_ID: 
    description: "The target Azure subscription"
    required: true
    type: string
  perform-checkout:
    description: "Set to false if the repository has already been checked out with fetch-depth 0"
    required: false
    default: "true"
  allow-data-loss:
    description: "Allow SQL schema changes that may cause data loss. When true, a pre-deploy database export is performed before deploying."
    required: false
    default: "false"
  backup-storage-account-name:
    description: "Storage account name for pre-deploy BACPAC export. Required when allow-data-loss is true."
    required: false
    default: ""
  backup-container-name:
    description: "Blob container name for pre-deploy BACPAC exports."
    required: false
    default: "sql-backups"
  
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      if: inputs.perform-checkout == 'true'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 'Az CLI Login'
      uses: azure/login@v3
      with:
        client-id: ${{ inputs.AZURE_CLIENT_ID }}
        tenant-id: ${{ inputs.AZURE_TENANT_ID }}
        subscription-id: ${{ inputs.AZURE_SUBSCRIPTION_ID }}

    - name: 'Install dotnet tools'
      shell: bash
      run: dotnet tool install -g microsoft.sqlpackage

    - name: Validate allow-data-loss inputs
      if: inputs.allow-data-loss == 'true'
      shell: bash
      run: |
        if [ -z "${{ inputs.backup-storage-account-name }}" ]; then
          echo "::error::allow-data-loss is true but backup-storage-account-name is not set. A pre-deploy export target is required."
          exit 1
        fi

    - name: Pre-deploy database export
      id: pre-deploy-export
      if: inputs.allow-data-loss == 'true'
      shell: bash
      run: |
        TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
        BACPAC_FILENAME="${{ inputs.sql-database-name }}-${TIMESTAMP}.bacpac"
        BACPAC_PATH="/tmp/${BACPAC_FILENAME}"

        echo "bacpac_path=${BACPAC_PATH}" >> $GITHUB_OUTPUT
        echo "bacpac_filename=${BACPAC_FILENAME}" >> $GITHUB_OUTPUT

        echo "Acquiring SQL access token..."
        SQL_TOKEN=$(az account get-access-token --resource https://database.windows.net/ --query accessToken -o tsv)

        echo "Exporting database to ${BACPAC_FILENAME}..."
        for attempt in 1 2; do
          if sqlpackage \
            /Action:Export \
            /TargetFile:"${BACPAC_PATH}" \
            /SourceConnectionString:"Server=tcp:${{ inputs.sql-server-fqdn }};Database=${{ inputs.sql-database-name }};" \
            /SourceAccessToken:"${SQL_TOKEN}"; then
            echo "Export succeeded on attempt ${attempt}"
            break
          else
            if [ "$attempt" -eq 2 ]; then
              echo "::error::Pre-deploy export failed after 2 attempts"
              exit 1
            fi
            echo "Export attempt ${attempt} failed. Waiting 15s before retry..."
            sleep 15
          fi
        done

        echo "Export complete: $(ls -lh ${BACPAC_PATH})"

    - name: Upload pre-deploy export to blob storage
      if: inputs.allow-data-loss == 'true' && steps.pre-deploy-export.outcome == 'success'
      shell: bash
      run: |
        BACPAC_PATH="${{ steps.pre-deploy-export.outputs.bacpac_path }}"
        BACPAC_FILENAME="${{ steps.pre-deploy-export.outputs.bacpac_filename }}"

        echo "Uploading ${BACPAC_FILENAME} to ${{ inputs.backup-storage-account-name }}/${{ inputs.backup-container-name }}..."
        for attempt in 1 2; do
          if az storage blob upload \
            --account-name "${{ inputs.backup-storage-account-name }}" \
            --container-name "${{ inputs.backup-container-name }}" \
            --name "${BACPAC_FILENAME}" \
            --file "${BACPAC_PATH}" \
            --auth-mode login \
            --overwrite; then
            echo "Upload succeeded on attempt ${attempt}"
            break
          else
            if [ "$attempt" -eq 2 ]; then
              echo "::error::BACPAC upload failed after 2 attempts"
              exit 1
            fi
            echo "Upload attempt ${attempt} failed. Waiting 15s before retry..."
            sleep 15
          fi
        done

        echo "Pre-deploy export uploaded: ${{ inputs.backup-storage-account-name }}/${{ inputs.backup-container-name }}/${BACPAC_FILENAME}"

    - name: Cleanup local export file
      if: always() && inputs.allow-data-loss == 'true' && steps.pre-deploy-export.outcome == 'success'
      shell: bash
      run: |
        BACPAC_PATH="${{ steps.pre-deploy-export.outputs.bacpac_path }}"
        if [ -f "${BACPAC_PATH}" ]; then
          rm -f "${BACPAC_PATH}"
          echo "Cleaned up local export file"
        fi

    - name: Deploy DACPAC (attempt 1)
      id: deploy-attempt-1
      continue-on-error: true
      uses: azure/sql-action@v2.3
      with:  
        connection-string: 'Server=tcp:${{ inputs.sql-server-fqdn }};Authentication=Active Directory Default; Database=${{ inputs.sql-database-name }};'   
        path: '${{ inputs.project-folder }}/${{ inputs.project-file }}'
        action: 'publish'
        build-arguments: '-c Release'
        arguments: '${{ inputs.sql-args }}${{ inputs.allow-data-loss == ''true'' && '' /p:BlockOnPossibleDataLoss=false'' || '''' }}'

    - name: Wait before retry (attempt 1)
      if: steps.deploy-attempt-1.outcome == 'failure'
      shell: bash
      run: echo "Deployment attempt 1 failed. Waiting 30s before retry..." && sleep 30

    - name: Deploy DACPAC (attempt 2)
      id: deploy-attempt-2
      if: steps.deploy-attempt-1.outcome == 'failure'
      continue-on-error: true
      uses: azure/sql-action@v2.3
      with:  
        connection-string: 'Server=tcp:${{ inputs.sql-server-fqdn }};Authentication=Active Directory Default; Database=${{ inputs.sql-database-name }};'   
        path: '${{ inputs.project-folder }}/${{ inputs.project-file }}'
        action: 'publish'
        build-arguments: '-c Release'
        arguments: '${{ inputs.sql-args }}${{ inputs.allow-data-loss == ''true'' && '' /p:BlockOnPossibleDataLoss=false'' || '''' }}'

    - name: Wait before retry (attempt 2)
      if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
      shell: bash
      run: echo "Deployment attempt 2 failed. Waiting 30s before retry..." && sleep 30

    - name: Deploy DACPAC (attempt 3)
      id: deploy-attempt-3
      if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
      uses: azure/sql-action@v2.3
      with:  
        connection-string: 'Server=tcp:${{ inputs.sql-server-fqdn }};Authentication=Active Directory Default; Database=${{ inputs.sql-database-name }};'   
        path: '${{ inputs.project-folder }}/${{ inputs.project-file }}'
        action: 'publish'
        build-arguments: '-c Release'
        arguments: '${{ inputs.sql-args }}${{ inputs.allow-data-loss == ''true'' && '' /p:BlockOnPossibleDataLoss=false'' || '''' }}'
