name: "deploy-logic-app"
description: "Deploys a web artifact to an Azure Logic App using Azure Web Apps Deploy action"

inputs:
  logic-app-artifact-name:
    description: "The name of the logic app artifact to deploy"
    required: true
  logic-app-name:
    description: "The name of the logic app to deploy"
    required: true
  logic-app-resource-group:
    description: "The resource group containing the logic app"
    required: true
  AZURE_CLIENT_ID:
    description: "The azure client/application ID configured for federated access"
    required: true
    type: string
  AZURE_TENANT_ID: 
    description: "The target Azure tenant"
    required: true
    type: string
  AZURE_SUBSCRIPTION_ID: 
    description: "The target Azure subscription"
    required: true
    type: string

runs:
  using: "composite"

  steps:
    - name: 'Az CLI Login'
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.AZURE_CLIENT_ID }}
        tenant-id: ${{ inputs.AZURE_TENANT_ID }}
        subscription-id: ${{ inputs.AZURE_SUBSCRIPTION_ID }}

    - name: Download artifact from build job
      uses: actions/download-artifact@v6
      with:
        name: ${{ inputs.logic-app-artifact-name }}
        path: artifacts/${{ inputs.logic-app-artifact-name }}

    - name: Check SCM endpoint health
      shell: bash
      run: |
        LOGIC_APP_NAME="${{ inputs.logic-app-name }}"
        RESOURCE_GROUP="${{ inputs.logic-app-resource-group }}"
        SCM_URL="https://${LOGIC_APP_NAME}.scm.azurewebsites.net/"
        MAX_RETRIES=5
        WAIT_SECONDS=120

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Checking SCM endpoint health (attempt $i/$MAX_RETRIES)..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SCM_URL" || echo "000")
          echo "SCM endpoint returned HTTP $HTTP_STATUS"

          # Any response other than 503/000 means the SCM web server is alive
          if [ "$HTTP_STATUS" != "503" ] && [ "$HTTP_STATUS" != "000" ]; then
            echo "SCM endpoint is healthy (HTTP $HTTP_STATUS). Proceeding with deployment."
            exit 0
          fi

          echo "SCM endpoint is unavailable (HTTP $HTTP_STATUS). Restarting logic app..."
          az functionapp restart --name "$LOGIC_APP_NAME" --resource-group "$RESOURCE_GROUP"

          if [ "$i" -lt "$MAX_RETRIES" ]; then
            echo "Waiting ${WAIT_SECONDS}s for SCM to recover..."
            sleep $WAIT_SECONDS
            WAIT_SECONDS=$((WAIT_SECONDS * 2))
          fi
        done

        echo "::error::SCM endpoint remained unavailable after $MAX_RETRIES restart attempts. Failing deployment."
        exit 1

    - name: Deploy to Azure Logic App (attempt 1)
      id: deploy-attempt-1
      continue-on-error: true
      uses: azure/functions-action@v1
      with:
        app-name: ${{ inputs.logic-app-name }}
        package: artifacts/${{ inputs.logic-app-artifact-name }}

    - name: Restart logic app after failed deployment (attempt 1)
      if: steps.deploy-attempt-1.outcome == 'failure'
      shell: bash
      run: |
        echo "Deployment attempt 1 failed with potential 503. Restarting logic app..."
        az functionapp restart --name "${{ inputs.logic-app-name }}" --resource-group "${{ inputs.logic-app-resource-group }}"
        echo "Waiting 120s for logic app to fully restart..."
        sleep 120

    - name: Deploy to Azure Logic App (attempt 2)
      id: deploy-attempt-2
      if: steps.deploy-attempt-1.outcome == 'failure'
      continue-on-error: true
      uses: azure/functions-action@v1
      with:
        app-name: ${{ inputs.logic-app-name }}
        package: artifacts/${{ inputs.logic-app-artifact-name }}

    - name: Restart logic app after failed deployment (attempt 2)
      if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
      shell: bash
      run: |
        echo "Deployment attempt 2 failed with potential 503. Restarting logic app..."
        az functionapp restart --name "${{ inputs.logic-app-name }}" --resource-group "${{ inputs.logic-app-resource-group }}"
        echo "Waiting 240s for logic app to fully restart..."
        sleep 240

    - name: Deploy to Azure Logic App (attempt 3)
      id: deploy-attempt-3
      if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
      uses: azure/functions-action@v1
      with:
        app-name: ${{ inputs.logic-app-name }}
        package: artifacts/${{ inputs.logic-app-artifact-name }}