name: "deploy-app-service"
description: "Deploys a web artifact to an Azure App Service using Azure Web Apps Deploy action"

inputs:
  web-artifact-name:
    description: "The name of the web artifact to deploy"
    required: true
  web-app-name:
    description: "The name of the web app the deploy to"
    required: true
  resource-group-name:
    description: 'Enter the resource group name of the web app'
    required: true
  AZURE_CLIENT_ID: 
    description: "The azure client/application ID configured for federated access"
    required: true
    type: string
  AZURE_TENANT_ID: 
    description: "The target Azure tenant"
    required: true
    type: string
  AZURE_SUBSCRIPTION_ID: 
    description: "The target Azure subscription"
    required: true
    type: string

runs:
  using: "composite"

  steps:
    - name: 'Az CLI Login'
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.AZURE_CLIENT_ID }}
        tenant-id: ${{ inputs.AZURE_TENANT_ID }}
        subscription-id: ${{ inputs.AZURE_SUBSCRIPTION_ID }}

    - name: Download artifact from build job
      uses: actions/download-artifact@v6
      with:
        name: ${{ inputs.web-artifact-name }}
        path: ${{ inputs.web-artifact-name }}

    - name: Check SCM deployment API health
      shell: bash
      run: |
        WEB_APP_NAME="${{ inputs.web-app-name }}"
        RESOURCE_GROUP="${{ inputs.resource-group-name }}"
        SCM_URL="https://${WEB_APP_NAME}.scm.azurewebsites.net/api/deployments"
        MAX_RETRIES=5
        WAIT_SECONDS=30

        # Get publishing credentials for authenticated SCM health check
        echo "Retrieving publishing credentials for authenticated SCM health check..."
        PUBLISH_USER=$(az webapp deployment list-publishing-credentials \
          --name "$WEB_APP_NAME" --resource-group "$RESOURCE_GROUP" \
          --query "publishingUserName" -o tsv)
        PUBLISH_PASS=$(az webapp deployment list-publishing-credentials \
          --name "$WEB_APP_NAME" --resource-group "$RESOURCE_GROUP" \
          --query "publishingPassword" -o tsv)

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Checking SCM deployment API health (attempt $i/$MAX_RETRIES)..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            -u "$PUBLISH_USER:$PUBLISH_PASS" "$SCM_URL" || echo "000")
          echo "SCM deployment API returned HTTP $HTTP_STATUS"

          if (( HTTP_STATUS >= 200 && HTTP_STATUS < 400 )); then
            echo "SCM deployment API is healthy (HTTP $HTTP_STATUS). Proceeding with deployment."
            exit 0
          fi

          echo "SCM deployment API is unavailable (HTTP $HTTP_STATUS). Restarting web app..."
          az webapp restart --name "$WEB_APP_NAME" --resource-group "$RESOURCE_GROUP"

          if [ "$i" -lt "$MAX_RETRIES" ]; then
            echo "Waiting ${WAIT_SECONDS}s for SCM to recover..."
            sleep $WAIT_SECONDS
          fi
        done

        echo "::error::SCM deployment API remained unavailable after $MAX_RETRIES restart attempts. Failing deployment."
        exit 1

    - name: Deploy to Azure Web App (attempt 1)
      id: deploy-attempt-1
      continue-on-error: true
      uses: azure/webapps-deploy@v3.0.1
      with:
        app-name: ${{ inputs.web-app-name }}
        resource-group-name: ${{ inputs.resource-group-name }}
        package: './${{ inputs.web-artifact-name }}'

    - name: Restart app service after failed deployment (attempt 1)
      if: steps.deploy-attempt-1.outcome == 'failure'
      shell: bash
      run: |
        echo "Deployment attempt 1 failed. Restarting app service to recover from potential 503..."
        az webapp restart --name "${{ inputs.web-app-name }}" --resource-group "${{ inputs.resource-group-name }}"
        echo "Waiting 60s for app service to fully restart..."
        sleep 60

    - name: Deploy to Azure Web App (attempt 2)
      id: deploy-attempt-2
      if: steps.deploy-attempt-1.outcome == 'failure'
      continue-on-error: true
      uses: azure/webapps-deploy@v3.0.1
      with:
        app-name: ${{ inputs.web-app-name }}
        resource-group-name: ${{ inputs.resource-group-name }}
        package: './${{ inputs.web-artifact-name }}'

    - name: Restart app service after failed deployment (attempt 2)
      if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
      shell: bash
      run: |
        echo "Deployment attempt 2 failed. Restarting app service to recover from potential 503..."
        az webapp restart --name "${{ inputs.web-app-name }}" --resource-group "${{ inputs.resource-group-name }}"
        echo "Waiting 60s for app service to fully restart..."
        sleep 60

    - name: Deploy to Azure Web App (attempt 3)
      id: deploy-attempt-3
      if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
      uses: azure/webapps-deploy@v3.0.1
      with:
        app-name: ${{ inputs.web-app-name }}
        resource-group-name: ${{ inputs.resource-group-name }}
        package: './${{ inputs.web-artifact-name }}'