name: Dependabot Auto-Merge
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions: {}

jobs:
  dependabot-policy:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false }}
    outputs:
      is_dependabot: ${{ steps.evaluate.outputs.is_dependabot }}
      auto_merge_allowed: ${{ steps.evaluate.outputs.auto_merge_allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Evaluate Dependabot policy
        id: evaluate
        uses: ./dependabot-policy
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  dependabot:
    needs:
      - dependabot-policy
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    if: ${{ needs.dependabot-policy.outputs.is_dependabot == 'true' && needs.dependabot-policy.outputs.auto_merge_allowed == 'true' }}
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
