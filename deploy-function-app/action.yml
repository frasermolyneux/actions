name: "deploy-function-app"
description: "Deploys a web artifact to an Azure Function App using Azure Web Apps Deploy action"

inputs:
  function-app-artifact-name:
    description: "The name of the function app artifact to deploy"
    required: true
  function-app-name:
    description: "The name of the function app to deploy"
    required: true
  function-app-resource-group:
    description: "The resource group containing the function app"
    required: true
  AZURE_CLIENT_ID: 
    description: "The azure client/application ID configured for federated access"
    required: true
    type: string
  AZURE_TENANT_ID: 
    description: "The target Azure tenant"
    required: true
    type: string
  AZURE_SUBSCRIPTION_ID: 
    description: "The target Azure subscription"
    required: true
    type: string

runs:
  using: "composite"

  steps:
    - name: 'Az CLI Login'
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.AZURE_CLIENT_ID }}
        tenant-id: ${{ inputs.AZURE_TENANT_ID }}
        subscription-id: ${{ inputs.AZURE_SUBSCRIPTION_ID }}

    - name: Download artifact from build job
      uses: actions/download-artifact@v6
      with:
        name: ${{ inputs.function-app-artifact-name }}
        path: artifacts/${{ inputs.function-app-artifact-name }}

    - name: Deploy to Azure Function App (attempt 1)
      id: deploy-attempt-1
      continue-on-error: true
      uses: azure/functions-action@v1
      with:
        app-name: ${{ inputs.function-app-name }}
        package: artifacts/${{ inputs.function-app-artifact-name }}

    - name: Wait before retry (attempt 1)
      if: steps.deploy-attempt-1.outcome == 'failure'
      shell: bash
      run: echo "Deployment attempt 1 failed. Waiting 30s before retry..." && sleep 30

    - name: Deploy to Azure Function App (attempt 2)
      id: deploy-attempt-2
      if: steps.deploy-attempt-1.outcome == 'failure'
      continue-on-error: true
      uses: azure/functions-action@v1
      with:
        app-name: ${{ inputs.function-app-name }}
        package: artifacts/${{ inputs.function-app-artifact-name }}

    - name: Wait before retry (attempt 2)
      if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
      shell: bash
      run: echo "Deployment attempt 2 failed. Waiting 30s before retry..." && sleep 30

    - name: Deploy to Azure Function App (attempt 3)
      id: deploy-attempt-3
      if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
      uses: azure/functions-action@v1
      with:
        app-name: ${{ inputs.function-app-name }}
        package: artifacts/${{ inputs.function-app-artifact-name }}