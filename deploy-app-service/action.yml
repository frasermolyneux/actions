name: "deploy-app-service"
description: "Deploys a web artifact to an Azure App Service using Azure Web Apps Deploy action"

inputs:
  web-artifact-name:
    description: "The name of the web artifact to deploy"
    required: true
  web-app-name:
    description: "The name of the web app the deploy to"
    required: true
  resource-group-name:
    description: 'Enter the resource group name of the web app'
    required: true
  AZURE_CLIENT_ID: 
    description: "The azure client/application ID configured for federated access"
    required: true
    type: string
  AZURE_TENANT_ID: 
    description: "The target Azure tenant"
    required: true
    type: string
  AZURE_SUBSCRIPTION_ID: 
    description: "The target Azure subscription"
    required: true
    type: string
  info-url:
    description: "Optional endpoint that returns build metadata containing buildVersion"
    required: false
    default: ""
  expected-version:
    description: "Optional expected build version to verify after deployment"
    required: false
    default: ""
  verify-max-attempts:
    description: "Maximum polling attempts when verifying version"
    required: false
    default: "30"
  verify-delay-seconds:
    description: "Delay (seconds) between polling attempts when verifying version"
    required: false
    default: "10"

runs:
  using: "composite"

  steps:
    - name: 'Az CLI Login'
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
      with:
        client-id: ${{ inputs.AZURE_CLIENT_ID }}
        tenant-id: ${{ inputs.AZURE_TENANT_ID }}
        subscription-id: ${{ inputs.AZURE_SUBSCRIPTION_ID }}

    - name: Download artifact from build job
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: ${{ inputs.web-artifact-name }}
        path: ${{ inputs.web-artifact-name }}

    - name: Validate version verification inputs
      if: ${{ (inputs.info-url != '' && inputs.expected-version == '') || (inputs.info-url == '' && inputs.expected-version != '') }}
      shell: bash
      run: |
        echo "::error::Both 'info-url' and 'expected-version' must be provided together."
        exit 1

    - name: Check SCM endpoint health
      shell: bash
      run: |
        WEB_APP_NAME="${{ inputs.web-app-name }}"
        RESOURCE_GROUP="${{ inputs.resource-group-name }}"
        SCM_URL="https://${WEB_APP_NAME}.scm.azurewebsites.net/"
        MAX_RETRIES=5
        WAIT_SECONDS=120

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Checking SCM endpoint health (attempt $i/$MAX_RETRIES)..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SCM_URL" || echo "000")
          echo "SCM endpoint returned HTTP $HTTP_STATUS"

          # Any response other than 503/000 means the SCM web server is alive
          if [ "$HTTP_STATUS" != "503" ] && [ "$HTTP_STATUS" != "000" ]; then
            echo "SCM endpoint is healthy (HTTP $HTTP_STATUS). Proceeding with deployment."
            exit 0
          fi

          echo "SCM endpoint is unavailable (HTTP $HTTP_STATUS). Restarting web app..."
          az webapp restart --name "$WEB_APP_NAME" --resource-group "$RESOURCE_GROUP"

          if [ "$i" -lt "$MAX_RETRIES" ]; then
            echo "Waiting ${WAIT_SECONDS}s for SCM to recover..."
            sleep $WAIT_SECONDS
            WAIT_SECONDS=$((WAIT_SECONDS * 2))
          fi
        done

        echo "::error::SCM endpoint remained unavailable after $MAX_RETRIES restart attempts. Failing deployment."
        exit 1

    - name: Deploy to Azure Web App (attempt 1)
      id: deploy-attempt-1
      continue-on-error: true
      uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383
      with:
        app-name: ${{ inputs.web-app-name }}
        resource-group-name: ${{ inputs.resource-group-name }}
        package: './${{ inputs.web-artifact-name }}'

    - name: Restart app service after failed deployment (attempt 1)
      if: steps.deploy-attempt-1.outcome == 'failure'
      shell: bash
      run: |
        echo "Deployment attempt 1 failed with potential 503. Restarting app service..."
        az webapp restart --name "${{ inputs.web-app-name }}" --resource-group "${{ inputs.resource-group-name }}"
        echo "Waiting 120s for app service to fully restart..."
        sleep 120

    - name: Deploy to Azure Web App (attempt 2)
      id: deploy-attempt-2
      if: steps.deploy-attempt-1.outcome == 'failure'
      continue-on-error: true
      uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383
      with:
        app-name: ${{ inputs.web-app-name }}
        resource-group-name: ${{ inputs.resource-group-name }}
        package: './${{ inputs.web-artifact-name }}'

    - name: Restart app service after failed deployment (attempt 2)
      if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
      shell: bash
      run: |
        echo "Deployment attempt 2 failed with potential 503. Restarting app service..."
        az webapp restart --name "${{ inputs.web-app-name }}" --resource-group "${{ inputs.resource-group-name }}"
        echo "Waiting 240s for app service to fully restart..."
        sleep 240

    - name: Deploy to Azure Web App (attempt 3)
      id: deploy-attempt-3
      if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
      uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383
      with:
        app-name: ${{ inputs.web-app-name }}
        resource-group-name: ${{ inputs.resource-group-name }}
        package: './${{ inputs.web-artifact-name }}'

    - name: Verify deployed version (attempt 1)
      id: verify-version-attempt-1
      if: ${{ inputs.info-url != '' && inputs.expected-version != '' }}
      continue-on-error: true
      shell: bash
      run: |
        EXPECTED_VERSION="${{ inputs.expected-version }}"
        INFO_URL="${{ inputs.info-url }}"
        MAX_ATTEMPTS="${{ inputs.verify-max-attempts }}"
        DELAY="${{ inputs.verify-delay-seconds }}"

        echo "Waiting for $INFO_URL to report version '$EXPECTED_VERSION' (max ${MAX_ATTEMPTS} attempts, ${DELAY}s interval)..."
        for i in $(seq 1 $MAX_ATTEMPTS); do
          RESPONSE=$(curl -s --connect-timeout 5 --max-time 15 "$INFO_URL" || true)
          CURRENT_VERSION=$(echo "$RESPONSE" | jq -r '.buildVersion // empty' 2>/dev/null || true)
          if [ "$CURRENT_VERSION" = "$EXPECTED_VERSION" ]; then
            echo "Version '$EXPECTED_VERSION' confirmed (attempt $i)"
            exit 0
          fi

          echo "Attempt $i/$MAX_ATTEMPTS: got version '$CURRENT_VERSION' - waiting ${DELAY}s..."
          sleep "$DELAY"
        done

        echo "::error::Expected version '$EXPECTED_VERSION' was not reported in time (last seen: '$CURRENT_VERSION')"
        exit 1

    - name: Restart app service after failed version verification
      if: ${{ steps.verify-version-attempt-1.outcome == 'failure' }}
      shell: bash
      run: |
        echo "Version verification failed after deployment. Restarting app service before redeploy..."
        az webapp restart --name "${{ inputs.web-app-name }}" --resource-group "${{ inputs.resource-group-name }}"
        echo "Waiting 60s for restart to settle..."
        sleep 60

    - name: Redeploy after failed version verification
      if: ${{ steps.verify-version-attempt-1.outcome == 'failure' }}
      uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383
      with:
        app-name: ${{ inputs.web-app-name }}
        resource-group-name: ${{ inputs.resource-group-name }}
        package: './${{ inputs.web-artifact-name }}'

    - name: Verify deployed version (attempt 2)
      if: ${{ steps.verify-version-attempt-1.outcome == 'failure' }}
      shell: bash
      run: |
        EXPECTED_VERSION="${{ inputs.expected-version }}"
        INFO_URL="${{ inputs.info-url }}"
        MAX_ATTEMPTS="${{ inputs.verify-max-attempts }}"
        DELAY="${{ inputs.verify-delay-seconds }}"

        echo "Retrying version verification for $INFO_URL expecting '$EXPECTED_VERSION'..."
        for i in $(seq 1 $MAX_ATTEMPTS); do
          RESPONSE=$(curl -s --connect-timeout 5 --max-time 15 "$INFO_URL" || true)
          CURRENT_VERSION=$(echo "$RESPONSE" | jq -r '.buildVersion // empty' 2>/dev/null || true)
          if [ "$CURRENT_VERSION" = "$EXPECTED_VERSION" ]; then
            echo "Version '$EXPECTED_VERSION' confirmed after redeploy (attempt $i)"
            exit 0
          fi

          echo "Attempt $i/$MAX_ATTEMPTS: got version '$CURRENT_VERSION' - waiting ${DELAY}s..."
          sleep "$DELAY"
        done

        echo "::error::Expected version '$EXPECTED_VERSION' was not reported in time after redeploy (last seen: '$CURRENT_VERSION')"
        exit 1