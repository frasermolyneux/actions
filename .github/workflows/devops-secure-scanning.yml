name: reusable-devops-secure-scanning

on:
  workflow_call:
    inputs:
      runner:
        description: Runner label to use for the scan job.
        required: false
        default: ubuntu-latest
        type: string
      config:
        description: Optional path to an MSDO configuration file (*.gdnconfig).
        required: false
        default: ""
        type: string
      policy:
        description: Optional MSDO policy name (GitHub, microsoft, none).
        required: false
        default: ""
        type: string
      categories:
        description: Optional comma-separated analyzer categories (e.g., IaC,secrets).
        required: false
        default: ""
        type: string
      languages:
        description: Optional comma-separated languages to analyze.
        required: false
        default: ""
        type: string
      tools:
        description: Optional comma-separated analyzers to run.
        required: false
        default: ""
        type: string
      sarif-artifact-name:
        description: Artifact name for the uploaded SARIF file.
        required: false
        default: alerts
        type: string

permissions: {}

jobs:
  devops-secure-scanning:
    permissions:
      contents: read
      actions: read
      id-token: write
      security-events: write
    name: DevOps Secure Scanning
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Run Microsoft Security DevOps Analysis
        id: msdo
        uses: microsoft/security-devops-action@08976cb623803b1b36d7112d4ff9f59eae704de0
        with:
          config: ${{ inputs.config }}
          policy: ${{ inputs.policy }}
          categories: ${{ inputs.categories }}
          languages: ${{ inputs.languages }}
          tools: ${{ inputs.tools }}

      - name: Upload alerts to Security tab
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}

      - name: Upload alerts file as a workflow artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ inputs.sarif-artifact-name }}
          path: ${{ steps.msdo.outputs.sarifFile }}
